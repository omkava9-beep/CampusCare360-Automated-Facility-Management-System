<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Building Icon (Brightened Navy) -->
  <g transform="translate(50, 20) scale(0.6)">
    <path d="M80 0 L160 60 V160 H0 V60 L80 0 Z" fill="#00aaff" /> <!-- Brighter blue -->
    <path d="M70 -20 V0 H90 V-20 Z" fill="#00aaff" /> <!-- Flag pole -->
    <path d="M90 -20 L120 -10 L90 0 Z" fill="#00aaff" /> <!-- Flag -->
    <rect x="30" y="80" width="30" height="30" rx="2" fill="white" fill-opacity="0.3" />
    <rect x="100" y="80" width="30" height="30" rx="2" fill="white" fill-opacity="0.3" />
    <rect x="30" y="120" width="30" height="30" rx="2" fill="white" fill-opacity="0.3" />
    <rect x="100" y="120" width="30" height="30" rx="2" fill="white" fill-opacity="0.3" />
    <path d="M70 160 Q80 130 90 160 Z" fill="white" fill-opacity="0.5" /> <!-- Door -->
  </g>

  <!-- Text: CAMPUS (White) -->
  <text x="100" y="145" font-family="'Times New Roman', Times, serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#ffffff">CAMPUS</text>
  
  <!-- Text: care (Light Gray) -->
  <text x="115" y="170" font-family="'Brush Script MT', cursive" font-size="24" text-anchor="middle" fill="#cccccc">care</text>
  
  <!-- 24/7 (Glowing Magenta) -->
  <text x="175" y="180" font-family="Arial, sans-serif" font-size="28" font-weight="900" text-anchor="end" fill="#ff00cc" filter="url(#glow)">24/7</text>
</svg>
